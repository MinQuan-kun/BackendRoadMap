<!DOCTYPE html>
<html>

<head>
    <title>Reset Password Code</title>
</head>

<body>
    <div
        style="font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; border: 1px solid #ddd; border-radius: 10px;">
        <h2 style="color: #333;">Reset Your Password</h2>
        <p>Hi <strong>{{UserName}}</strong>,</p>
        <p>We received a request to reset your password. Use the following code to proceed:</p>
        <div
            style="background-color: #f4f4f4; padding: 15px; font-size: 24px; text-align: center; font-weight: bold; letter-spacing: 5px; border-radius: 5px; margin: 20px 0;">
            {{Code}}
        </div>
        <p>This code will expire in <strong>15 minutes</strong>.</p>
        <p>If you did not request a password reset, you can safely ignore this email.</p>
        <br>
        <p>Best regards,<br>GAMENODE Support Team</p>
    </div>
</body>

</html>
